    Entrou: '&a&lSUCESSO! &aVocê entrou no evento corrida.'
    Saiu: '&a&lSUCESSO! &aVocê saiu do evento corrida.'
    Iniciou: '&a&lSUCESSO! &aCorrida iniciada.'
    Parou: '&a&lSUCESSO! &aCorrida parada.'
    Permissao: '&c&lERRO! &cVocê não tem permissão para fazer isto.'
