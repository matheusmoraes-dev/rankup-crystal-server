    Anuncio:
    - ''
    - '&f[&3Evento &7Matematica&f]'
    - ''
    - '&fDê o resultado da expressão usando: &8/matematica <resultado>&f.'
    - '&fPrêmio: &a{premio}&f.'
    - '&fExpressão: &7{expressao}&f.'
    - ''
    Acertou:
    - ''
    - '&f[&3Evento &7Matematica&f]'
    - ''
    - '&fO jogador &a{player}&f é esperto!'
    - '&fO mesmo ganhou &a{premio}&f em money.'
    - ''
    Cancelou:
    - ''
    - '&f[&3Evento &7Matematica&f]'
    - ''
    - '&cA matemática foi cancelado por um admin.'
    - ''
  Premio:
    Comando:
      Usar: false
      Comando:
      - give {player} diamond 1
    Money:
      Usar: true
      Money: 950000.0
