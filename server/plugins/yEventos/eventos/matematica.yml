    Comando: matematica
    Aliases: {}
  AutoStart:
    Ativar: true
    Horarios:
    - 1-4:10:1
    - 2-4:10:1
    - 3-4:10:1
    - 4-4:10:1
    - 5-4:10:1
    - 6-4:10:1
    - 7-4:10:1
    - 8-4:10:1
