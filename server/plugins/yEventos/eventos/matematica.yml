    - '&3Comandos do evento &7Matematica&3:'
    - ''
    - '&8-> &7/matematica &fajuda &8- &5Mostra essa mensagem.'
    - '&8-> &7/matematica &finiciar &8- &5Iniciar uma matematica.'
    - '&8-> &7/matematica &fparar &8- &5Parar uma matematica.'
    - '&8-> &7/matematica &f<resultado> &8- &5Dar o resultado.'
    - ''
    Nao ativo: '&c&lERRO! &cA matemática não está ativa.'
    Errou: '&c&lTRISTE! &cVocê errou o resultado :c'
    Acertou: '&a&lPARABÉNS! &aVocê acertou o resultado e ganhou &7{premio}&a em money.'
    Nao pode iniciar: '&c&lERRO! &cA matemática já está ocorrendo.'
    Nao pode parar: '&c&lERRO! &cA matemática não está ocorrendo.'
    Iniciou: '&a&lSUCESSO! &aMatemática iniciada.'
    Parou: '&a&lSUCESSO! &aMatemática parada.'
    Permissao: '&c&lERRO! &cVocê não tem permissão para fazer isto.'
